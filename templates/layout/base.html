{{define "base"}}
<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aplikasi Journal Entry — Pembukuan & Akuntansi">

    <title>{{block "title" .}}Journal Entry{{end}} — Jurnal Akuntansi</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.7" defer></script>

    <!-- Alpine.js -->
    <script src="https://unpkg.com/@alpinejs/morph@3.15.8/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/alpinejs@3.15.8/dist/cdn.min.js" defer></script>
</head>

<body x-data="{ sidebarOpen: true, toast: { show: false, message: '', type: 'success' } }" @show-toast.window="
        toast.message = $event.detail.message || 'Berhasil!';
        toast.type = $event.detail.type || 'success';
        toast.show = true;
        setTimeout(() => toast.show = false, 3000);
    " class="l-app">
    <!-- Toast Notification -->
    {{template "_toast.html" .}}

    <!-- Header -->
    <header class="l-header">
        <div class="l-header__left">
            <button class="l-header__toggle" @click="sidebarOpen = !sidebarOpen" aria-label="Toggle sidebar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <a href="/" class="l-header__logo">
                <span class="l-header__logo-icon">📒</span>
                <span class="l-header__logo-text">Jurnal</span>
            </a>
        </div>
        <div class="l-header__right">
            <span class="l-header__date" id="header-date"></span>
        </div>
    </header>

    <div class="l-body" :class="{ 'l-body--sidebar-closed': !sidebarOpen }">
        <!-- Sidebar -->
        <aside class="l-sidebar" :class="{ 'l-sidebar--closed': !sidebarOpen }">
            <nav class="l-sidebar__nav">
                <a href="/" class="l-sidebar__link {{block " nav_dashboard" .}}{{end}}">
                    <svg class="l-sidebar__icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                    </svg>
                    <span class="l-sidebar__label">Dashboard</span>
                </a>
                <a href="/accounts" class="l-sidebar__link {{block " nav_accounts" .}}{{end}}">
                    <svg class="l-sidebar__icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16v16H4z"></path>
                        <line x1="4" y1="9" x2="20" y2="9"></line>
                        <line x1="9" y1="4" x2="9" y2="20"></line>
                    </svg>
                    <span class="l-sidebar__label">Daftar Akun</span>
                </a>
                <a href="/journals" class="l-sidebar__link {{block " nav_journals" .}}{{end}}">
                    <svg class="l-sidebar__icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                    </svg>
                    <span class="l-sidebar__label">Jurnal</span>
                </a>

                <div class="l-sidebar__divider"></div>

                <a href="/reports/ledger" class="l-sidebar__link {{block " nav_ledger" .}}{{end}}">
                    <svg class="l-sidebar__icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <line x1="8" y1="6" x2="21" y2="6"></line>
                        <line x1="8" y1="12" x2="21" y2="12"></line>
                        <line x1="8" y1="18" x2="21" y2="18"></line>
                        <line x1="3" y1="6" x2="3.01" y2="6"></line>
                        <line x1="3" y1="12" x2="3.01" y2="12"></line>
                        <line x1="3" y1="18" x2="3.01" y2="18"></line>
                    </svg>
                    <span class="l-sidebar__label">Buku Besar</span>
                </a>
                <a href="/reports/trial-balance" class="l-sidebar__link {{block " nav_trial_balance" .}}{{end}}">
                    <svg class="l-sidebar__icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                    </svg>
                    <span class="l-sidebar__label">Neraca Saldo</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="l-content">
            {{block "content" .}}
            <p>Halaman tidak ditemukan.</p>
            {{end}}
        </main>
    </div>

    <!-- App JS -->
    <script src="/static/js/app.js"></script>
    <script>
        // Display current date in header
        document.getElementById('header-date').textContent =
            new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    </script>
</body>

</html>
{{end}}
